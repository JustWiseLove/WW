<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WW Journey</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>WW Journey</h1>
            <div class="profile-summary">
                <span id="target-display" class="clickable">Target: 25</span>
            </div>
        </header>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="today">Today</button>
            <button class="tab-btn" data-tab="library">Library</button>
            <button class="tab-btn" data-tab="history">History</button>
        </div>

        <!-- Today Tab -->
        <div id="today-tab" class="tab-content active">
            <div class="progress-section">
                <div class="progress-circle">
                    <svg id="progress-svg" width="180" height="180">
                        <circle class="bg-circle" cx="90" cy="90" r="82"></circle>
                        <circle id="progress-circle" cx="90" cy="90" r="82"></circle>
                    </svg>
                    <div class="progress-text">
                        <div id="points-today" class="points-large">0</div>
                        <div id="target-small" class="target-small">/ 25</div>
                    </div>
                </div>
            </div>

            <div class="flex-points">
                <div>Flex Points This Week: <strong id="flex-remaining">35</strong>/35</div>
                <small id="week-range"></small>
            </div>

            <div class="daily-entries">
                <h2>Today's Entries</h2>
                <div id="today-entries" class="entries-list"></div>
            </div>

            <button id="add-food-today" class="add-btn">+ Add Food</button>
        </div>

        <!-- Library Tab -->
        <div id="library-tab" class="tab-content">
            <div class="search-bar">
                <input type="text" id="library-search" placeholder="Search foods...">
                <button id="add-new-food" class="add-btn-small">+ New</button>
            </div>
            
            <div id="food-library" class="food-grid"></div>
        </div>

        <!-- History Tab -->
        <div id="history-tab" class="tab-content">
            <div id="history-list" class="history-list"></div>
        </div>
    </div>

    <!-- Profile Modal -->
    <div id="profile-modal" class="modal">
        <div class="modal-content">
            <h3>Daily Target Settings</h3>
            <div class="modal-input-group">
                <label>Current Weight (lbs)</label>
                <input type="number" id="profile-weight" value="160" class="modal-input">
            </div>
            <div class="modal-input-group">
                <label>Activity Level</label>
                <select id="profile-activity" class="modal-input">
                    <option value="sedentary">Sedentary (little exercise)</option>
                    <option value="moderate" selected>Moderate (some exercise)</option>
                    <option value="active">Active (regular exercise)</option>
                </select>
            </div>
            <div class="modal-points" style="margin:20px 0;">
                Daily Target: <strong id="calculated-target">26</strong> points
            </div>
            <div class="modal-actions">
                <button id="profile-cancel" class="secondary-btn">Cancel</button>
                <button id="profile-save" class="primary-btn">Save Settings</button>
            </div>
        </div>
    </div>

    <!-- Add/Edit Food Modal -->
    <div id="food-modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-title">Add New Food</h3>
            <input type="text" id="food-name" placeholder="Food name" class="modal-input">
            <div class="modal-grid">
                <div>
                    <label>Calories</label>
                    <input type="number" id="food-cal" value="100" class="modal-input">
                </div>
                <div>
                    <label>Fat (g)</label>
                    <input type="number" id="food-fat" value="0" class="modal-input">
                </div>
                <div>
                    <label>Fiber (g)</label>
                    <input type="number" id="food-fiber" value="0" class="modal-input">
                </div>
            </div>
            <div class="modal-points">
                Points: <span id="modal-points">2</span>
            </div>
            <div class="modal-actions">
                <button id="modal-cancel" class="secondary-btn">Cancel</button>
                <button id="modal-save" class="primary-btn">Save Food</button>
            </div>
        </div>
    </div>

    <!-- Add to Day Modal -->
    <div id="add-to-day-modal" class="modal">
        <div class="modal-content">
            <h3>Add to <span id="modal-day-date"></span></h3>
            <input type="text" id="add-search" placeholder="Search library..." class="modal-input">
            <div id="modal-food-list" class="modal-food-list"></div>
            <button id="close-add-modal" class="secondary-btn">Close</button>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
</body>
</html>
