<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WW Journey</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <!-- HEADER -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">🧾</span>
                    <span class="logo-text">WW Journey</span>
                </div>
                <div class="header-actions">
                    <button onclick="showSettings()" class="icon-btn">⚙️</button>
                </div>
            </div>
            <div class="week-summary">
                <div class="summary-item">
                    <span class="label">Week Flex</span>
                    <span id="flex-remaining" class="value">35</span>
                </div>
                <div class="summary-item">
                    <span class="label">Daily Target</span>
                    <span id="daily-target" class="value">25</span>
                </div>
            </div>
        </header>

        <!-- NAV TABS -->
        <nav class="tabs">
            <button onclick="switchTab(0)" class="tab-btn active" id="tab-today">Today</button>
            <button onclick="switchTab(1)" class="tab-btn" id="tab-library">Library</button>
            <button onclick="switchTab(2)" class="tab-btn" id="tab-history">History</button>
        </nav>

        <!-- MAIN CONTENT -->
        <main class="main-content">

            <!-- TODAY PAGE -->
            <div id="page-today" class="page active">
                <div class="today-header">
                    <div class="current-date" id="current-date"></div>
                    <div class="progress-circle">
                        <svg width="110" height="110">
                            <circle cx="55" cy="55" r="48" fill="none" stroke="#e5d9c0" stroke-width="12"></circle>
                            <circle id="progress-ring" cx="55" cy="55" r="48" fill="none" stroke="#4a7043" stroke-width="12" stroke-dasharray="301.59" stroke-dashoffset="0" transform="rotate(-90 55 55)"></circle>
                        </svg>
                        <div class="progress-text">
                            <div id="today-points" class="big-points">0</div>
                            <div class="target-label">of <span id="target-small">25</span></div>
                        </div>
                    </div>
                </div>

                <div class="entries-list" id="today-entries">
                    <!-- JS populated -->
                </div>

                <div class="add-section">
                    <button onclick="showAddFoodModal()" class="add-food-btn">
                        + Add Food
                    </button>
                </div>

                <div class="action-bar">
                    <button onclick="undoLastAction()" class="secondary-btn">Undo</button>
                    <button onclick="startNewDay()" class="primary-btn">End Day &amp; Save</button>
                </div>
            </div>

            <!-- LIBRARY PAGE -->
            <div id="page-library" class="page">
                <div class="search-bar">
                    <input type="text" id="library-search" placeholder="Search foods..." onkeyup="filterLibrary()">
                    <button onclick="showNewFoodForm()" class="add-lib-btn">+ New</button>
                </div>
                
                <div class="library-list" id="library-list">
                    <!-- JS populated -->
                </div>
            </div>

            <!-- HISTORY PAGE -->
            <div id="page-history" class="page">
                <div class="history-header">
                    <button onclick="startNewWeek()" class="new-week-btn">Start New Week</button>
                </div>
                <div class="history-list" id="history-list">
                    <!-- JS populated -->
                </div>
            </div>
        </main>

        <!-- BOTTOM NAV -->
        <footer class="bottom-nav">
            <button onclick="switchTab(0)" class="nav-item active" id="nav-today">
                <span class="nav-icon">📅</span>
                <span>Today</span>
            </button>
            <button onclick="switchTab(1)" class="nav-item" id="nav-library">
                <span class="nav-icon">📚</span>
                <span>Library</span>
            </button>
            <button onclick="switchTab(2)" class="nav-item" id="nav-history">
                <span class="nav-icon">📖</span>
                <span>History</span>
            </button>
        </footer>
    </div>

    <!-- ADD FOOD MODAL -->
    <div id="add-food-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Add to Today</h3>
                <button onclick="hideAddFoodModal()" class="close-btn">✕</button>
            </div>
            <div class="modal-body">
                <input type="text" id="modal-search" placeholder="Search library..." onkeyup="modalSearch()">
                <div class="modal-library" id="modal-library-list">
                    <!-- JS populated -->
                </div>
            </div>
        </div>
    </div>

    <!-- NEW FOOD FORM MODAL -->
    <div id="new-food-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="food-modal-title">New Food Item</h3>
                <button onclick="hideNewFoodModal()" class="close-btn">✕</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-food-id">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="new-name" placeholder="e.g. Grilled Chicken">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Calories</label>
                        <input type="number" id="new-calories" value="120">
                    </div>
                    <div class="form-group">
                        <label>Fat (g)</label>
                        <input type="number" id="new-fat" value="3">
                    </div>
                </div>
                <div class="form-group">
                    <label>Fiber (g)</label>
                    <input type="number" id="new-fiber" value="0">
                </div>
                <div class="points-preview">
                    Points: <span id="points-preview">2</span>
                </div>
            </div>
            <div class="modal-footer">
                <button onclick="hideNewFoodModal()" class="secondary-btn">Cancel</button>
                <button onclick="saveNewFood()" class="primary-btn" id="save-food-btn">Save to Library</button>
            </div>
        </div>
    </div>

    <!-- SETTINGS MODAL -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Settings</h3>
                <button onclick="hideSettings()" class="close-btn">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Weight (lbs)</label>
                    <input type="number" id="settings-weight" value="160" oninput="updateTargetPreview()">
                </div>
                <div class="form-group">
                    <label>Activity Level</label>
                    <select id="settings-activity" onchange="updateTargetPreview()">
                        <option value="sedentary">Sedentary (0)</option>
                        <option value="moderate" selected>Moderate (+2)</option>
                        <option value="active">Active (+4)</option>
                    </select>
                </div>
                <div class="preview-target">
                    Estimated daily target: <strong id="preview-target">27</strong>
                </div>
            </div>
            <div class="modal-footer">
                <button onclick="hideSettings()" class="secondary-btn">Cancel</button>
                <button onclick="saveSettings()" class="primary-btn">Save</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
